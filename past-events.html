<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <title>LiveCTF</title>
    <style>
      body {
        font-family: sans-serif;
        color: #fff;
        background: #000;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      #page {
        position: relative;
        min-height: 100vh;
        display: flow-root;
      }

      video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: auto;
        z-index: -1;
      }

      .broadcast {
        color: #6699ff;
      }

      #content {
        display: flex;
        padding: 0 15%;
      }

      #partner {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
      }

      #links {
        padding: 20px;
        width: 60%;
      }

      #space {
        text-align: center;
        margin-top: 28.125vw;
        height: 14.6vw;
        margin-bottom: 2vw;
        font-size: clamp(10px, 1.4vw, 28px);
      }

      #space h2 {
        font-size: 1.5em;
        margin: 0.3em 0;
      }

      #space h3 {
        font-size: 1.1em;
        margin: 0.3em 0;
      }

      #partner h2 {
        font-size: clamp(14px, 1.6vw, 32px);
      }

      a.broadcast,
      a,
      a.broadcast:visited {
        color: #9932cc;
      }

      #previous {
        /*position: absolute;
      left: 50%;
      bottom: 0;*/
        padding: 10px;
        width: 20%;
        /*transform: translate(-50%, -50%);*/
        border: 1px solid rgb(223, 60, 220);
      }

      #previous a {
        color: white;
      }

      #previous ul li {
        list-style-type: none;
        padding-bottom: 5px;
      }

      #bracket {
        position: absolute;
        bottom: -100%;
        left: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      #bracket-button {
        position: absolute;
        bottom: 50px;
        right: 50px;
        background: #d81bc8;
        box-shadow: 0 0 15px 5px #f638e6;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        font-size: 20pt;
        text-align: center;
        padding: 10px;
        animation: pulse 3s infinite;
        cursor: pointer;
      }

      .chevron::before {
        border-style: solid;
        border-width: 0.15em 0.15em 0 0;
        content: "";
        display: inline-block;
        height: 20px;
        position: relative;
        width: 20px;
        top: 0;
        transform: rotate(135deg);
      }

      .chevron {
        margin-top: 5px;
        height: 20px;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 5px 2px #f638e6;
        }

        50% {
          box-shadow: 0 0 15px 5px #f638e6;
        }

        100% {
          box-shadow: 0 0 5px 2px #f638e6;
        }
      }

      #events {
        display: flex;
        justify-content: center;
        gap: 40px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      #events a {
        color: white;
      }

      .year h3 {
        color: rgb(223, 60, 220);
        font-weight: normal;
        margin: 0 0 8px 0;
        text-align: center;
        border-bottom: 1px solid rgb(223, 60, 220);
        padding-bottom: 4px;
      }

      .year ul {
        list-style: none;
        padding: 0;
        margin: 0;
        text-align: center;
      }

      .year li {
        padding: 4px 0;
      }
    </style>
  </head>

  <body>
    <div id="page">
      <video poster="./logo.png" autoplay playsinline muted loop>
        <source src="./title.mp4" type="video/mp4" />
      </video>

      <div id="space">
        Past LiveCTF Events
        <div id="events">
          <div class="year">
            <h3>2022</h3>
            <ul>
              <li><a href="2022.html">DEF CON Finals</a></li>
            </ul>
          </div>
          <div class="year">
            <h3>2023</h3>
            <ul>
              <li><a href="2023-quals.html">DEF CON Quals</a></li>
              <li><a href="2023.html">DEF CON Finals</a></li>
            </ul>
          </div>
          <div class="year">
            <h3>2024</h3>
            <ul>
              <li><a href="2024-quals.html">DEF CON Quals</a></li>
              <li><a href="https://www.youtube.com/playlist?list=PLmnqtYqOCF7-tVwsYDYSJePlMDedFSYvb">DEF CON Finals</a></li>
            </ul>
          </div>
          <div class="year">
            <h3>2025</h3>
            <ul>
              <li><a href="https://www.youtube.com/playlist?list=PLmnqtYqOCF7-gbw64gdxBxb9TXu_l_q9i">DEF CON Quals</a></li>
              <li><a href="https://www.youtube.com/playlist?list=PLmnqtYqOCF7-LIoYJ61MdTSW1n82uPQxj">DEF CON Finals</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
