<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <title>LiveCTF</title>
    <style>
      body {
        font-family: sans-serif;
        color: #fff;
        background: #000;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      #page {
        position: relative;
        min-height: 100vh;
        display: flow-root;
      }

      video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: auto;
        z-index: -1;
      }

      .broadcast {
        color: #6699ff;
      }

      #content {
        display: flex;
        padding: 0 15%;
      }

      #partner {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 20px;
      }

      #links {
        padding: 20px;
        width: 60%;
      }

      #space {
        text-align: center;
        margin-top: 28.125vw;
        height: 14.6vw;
        margin-bottom: 2vw;
        font-size: clamp(10px, 1.4vw, 28px);
      }

      #space h2 {
        font-size: 1.5em;
        margin: 0.3em 0;
      }

      #space h3 {
        font-size: 1.1em;
        margin: 0.3em 0;
      }

      #partner h2 {
        font-size: clamp(14px, 1.6vw, 32px);
      }

      #partner a {
        display: contents;
      }

      a.broadcast,
      a,
      a.broadcast:visited {
        color: #9932cc;
      }

      #previous {
        /*position: absolute;
      left: 50%;
      bottom: 0;*/
        padding: 10px;
        width: 20%;
        /*transform: translate(-50%, -50%);*/
        border: 1px solid rgb(223, 60, 220);
      }

      #previous a {
        color: white;
      }

      #previous ul li {
        list-style-type: none;
        padding-bottom: 5px;
      }

      #bracket {
        position: absolute;
        bottom: -100%;
        left: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }

      #bracket-button {
        position: absolute;
        bottom: 50px;
        right: 50px;
        background: #d81bc8;
        box-shadow: 0 0 15px 5px #f638e6;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        font-size: 20pt;
        text-align: center;
        padding: 10px;
        animation: pulse 3s infinite;
        cursor: pointer;
      }

      .chevron::before {
        border-style: solid;
        border-width: 0.15em 0.15em 0 0;
        content: "";
        display: inline-block;
        height: 20px;
        position: relative;
        width: 20px;
        top: 0;
        transform: rotate(135deg);
      }

      .chevron {
        margin-top: 5px;
        height: 20px;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 5px 2px #f638e6;
        }

        50% {
          box-shadow: 0 0 15px 5px #f638e6;
        }

        100% {
          box-shadow: 0 0 5px 2px #f638e6;
        }
      }
    </style>
  </head>

  <body>
    <div id="page">
      <video poster="./logo.png" autoplay playsinline muted loop>
        <source src="./title.mp4" type="video/mp4" />
      </video>

      <div id="space">
        <h2>LiveCTF is at <a href="https://bbbctf.com/">DEF CON 34 CTF Quals</a>!</h2>
        <h3>For LiveCTF schedule, rules, and docs see <a href="https://play.livectf.com">https://play.livectf.com/</a></h3>
        <h3>Next live stream always available on <a href="https://youtube.com/@LiveCTF/live">our YouTube</a></h3>
        <h3>See previous events <a href="./past-events.html">here</a></h3>
      </div>
      <div id="partner">
          <h2>In partnership with:</h2>
          <a href="https://bbbirds.org"><img src="./bbb.svg" width="10%" /></a>
      </div>
    </div>
  </body>
</html>
